<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso cliente | Fénix Digital TV</title>
  <style>
    :root { --bg:#F7F8FC; --card:#FFFFFF; --text:#111827; --muted:#5F6B7A; --orange:#FF6A00; --gold:#F6B73C; --border:rgba(17,24,39,.12); --red:#DC2626; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif; color:var(--text); background:
      radial-gradient(circle at 20% 10%,rgba(255,106,0,.10),transparent 34%),
      radial-gradient(circle at 85% 0%,rgba(109,40,217,.08),transparent 32%),
      linear-gradient(180deg,#FFFFFF 0%,#F7F8FC 54%,#FFFFFF 100%); padding:20px; }
    .card { width:min(430px,100%); border:1px solid var(--border); border-radius:28px; background:linear-gradient(180deg,#FFFFFF,#F8FAFC); padding:28px; box-shadow:0 24px 70px rgba(15,23,42,.12); }
    .logo { width:130px; display:block; margin:0 0 20px; }
    h1 { margin:0 0 8px; font-size:34px; letter-spacing:-.04em; }
    p { margin:0 0 22px; color:var(--muted); line-height:1.5; }
    label { display:block; color:var(--muted); font-size:13px; font-weight:800; margin:14px 0 6px; }
    input { width:100%; border:1px solid var(--border); background:#FFFFFF; color:var(--text); border-radius:14px; padding:13px; font:inherit; }
    button, .btn { width:100%; display:inline-flex; align-items:center; justify-content:center; border:0; border-radius:999px; margin-top:18px; padding:13px 18px; font-weight:950; cursor:pointer; background:linear-gradient(135deg,var(--orange),var(--gold)); color:#170B02; text-decoration:none; }
    .ghost { background:#FFFFFF; color:var(--text); border:1px solid var(--border); margin-top:10px; box-shadow:0 8px 18px rgba(15,23,42,.05); }
    .error { border:1px solid rgba(220,38,38,.25); background:rgba(220,38,38,.10); color:#B91C1C; border-radius:14px; padding:12px; margin-bottom:16px; font-size:14px; }
    @media (max-width:480px) {
      body { padding:14px; align-items:start; padding-top:28px; }
      .card { padding:22px 18px; border-radius:22px; }
      .logo { width:118px; margin-bottom:18px; }
      h1 { font-size:30px; }
      p { font-size:15px; }
      input { font-size:16px; min-height:46px; }
      button, .btn { min-height:46px; }
    }
  </style>
</head>
<body>
  <form class="card" method="POST">
    <img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="Fénix Digital TV">
    <h1>Portal del cliente</h1>
    <p>Consulta tu acceso, vencimiento y datos de la app recomendada.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label>Usuario</label>
    <input name="username" autocomplete="username" required placeholder="Tu usuario Fénix">
    <label>Contraseña</label>
    <input name="password" type="password" autocomplete="current-password" required placeholder="Contraseña del portal">
    <button type="submit">Ingresar</button>
    <a class="btn ghost" href="/inicio">Volver a inicio</a>
  </form>
</body>
</html>
