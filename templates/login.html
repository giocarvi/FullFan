<!DOCTYPE html><html><head><title>Login - Full Fan</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f4f9;"><div style="background:white; padding:30px; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1); width:100%; max-width:400px; text-align:center;"><h2>Ingreso al Panel</h2><form method="POST"><input type="text" name="username" placeholder="Usuario" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;"><input type="password" name="password" placeholder="Contraseña" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;"><button type="submit" style="width:100%; padding:12px; background:#e63946; color:white; border:none; border-radius:5px; font-weight:bold;">Entrar</button></form></div></body></html>
