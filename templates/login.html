<!DOCTYPE html>
<html>
<head>
  <title>Login - Fénix Digital TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#0B1020;">
  <div style="background:#111827; color:#F8F7F2; padding:30px; border-radius:16px; box-shadow:0 16px 45px rgba(0,0,0,0.35); width:100%; max-width:400px; text-align:center; border:1px solid rgba(255,200,87,0.25);">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Fénix Digital TV" style="max-width:260px; width:80%; margin-bottom:18px;">
    <p style="margin:0 0 24px; color:#CBD5E1;">Tu entretenimiento, sin fronteras.</p>
    <form method="POST">
      <input type="text" name="username" placeholder="Usuario" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.12); border-radius:8px; box-sizing:border-box; background:#0B1020; color:#F8F7F2;">
      <input type="password" name="password" placeholder="Contraseña" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.12); border-radius:8px; box-sizing:border-box; background:#0B1020; color:#F8F7F2;">
      <button type="submit" style="width:100%; padding:12px; background:#FF6A00; color:white; border:none; border-radius:8px; font-weight:bold;">Entrar</button>
    </form>
    <a href="/inicio" style="display:inline-block;margin-top:16px;color:#FFC857;text-decoration:none;font-size:13px;">Ver página pública</a>
  </div>
</body>
</html>
