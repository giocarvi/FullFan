<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Panel — Iniciar sesión</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
  }
  .logo h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo p {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input::placeholder { color: rgba(255,255,255,0.3); }
  input:focus { border-color: #6c63ff; background: rgba(108,99,255,0.1); }
  .btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .error {
    background: rgba(239,68,68,0.2);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">📡</span>
    <h1>IPTV Panel</h1>
    <p>Control de Clientes</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" name="username" placeholder="Tu usuario" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="Tu contraseña" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Iniciar sesión</button>
  </form>
</div>
</body>
</html>
