<!DOCTYPE html><html><head><title>Clientes - Full Fan</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><nav><a href="{{ url_for('index') }}" style="color:white; text-decoration:none;">⬅ Volver</a><span>Clientes</span></nav><div class="container"><form method="GET" style="display:flex; gap:10px; margin-bottom:20px;"><input type="text" name="search" placeholder="Buscar por nombre o usuario..." style="flex:1; padding:12px; border-radius:5px; border:1px solid #ccc;"><button type="submit" style="padding:12px 20px; background:#1c1e21; color:white; border:none; border-radius:5px;">Buscar</button></form>{% for client in clients %}<a href="{{ url_for('client_detail', id=client.id) }}" style="text-decoration:none; color:black;"><div class="card" style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;"><div><h4 style="margin:0;">{{ client.name }}</h4><p style="margin:5px 0 0 0; color:#666; font-family:monospace;">{{ client.username }}</p></div><span style="color:#e63946;">Ver ➔</span></div></a>{% endfor %}</div></body></html>
